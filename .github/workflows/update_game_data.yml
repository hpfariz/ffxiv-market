name: Update Game Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-game-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          CURRENT=$(git rev-parse HEAD:xiv-gen/ffxiv-datamining)
          REMOTE=$(git ls-remote https://github.com/xivapi/ffxiv-datamining.git master | awk '{print $1}')
          
          if [ "$CURRENT" = "$REMOTE" ]; then
            echo "No updates found."
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Updates found!"
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Submodule
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git -C xiv-gen/ffxiv-datamining fetch origin master
          git -C xiv-gen/ffxiv-datamining checkout FETCH_HEAD
          git -C xiv-gen/ffxiv-datamining submodule update --init --recursive

      - name: Verify Build
        if: steps.check.outputs.has_updates == 'true'
        run: |
          cargo check -p xiv-gen-db

      - name: Push Update Branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B update-game-data
          git add xiv-gen/ffxiv-datamining
          git commit -m "chore: update game data"
          git push --force-with-lease origin update-game-data
          echo "Game data update branch pushed:"
          echo "https://github.com/${{ github.repository }}/pull/new/update-game-data"
